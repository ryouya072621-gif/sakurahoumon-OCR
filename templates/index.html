{% extends "base.html" %}
{% block title %}アップロード - YomiToku Web{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto mt-12">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">PDF / 画像をアップロード</h1>
        <p class="text-gray-500">相談シート・報告書をOCRで文字起こしします</p>
    </div>

    <form id="upload-form" action="/upload" method="post" enctype="multipart/form-data">
        <div id="drop-zone"
             class="border-2 border-dashed border-indigo-300 rounded-xl p-12 text-center cursor-pointer
                    hover:border-indigo-500 hover:bg-indigo-50 transition-colors">
            <svg class="mx-auto h-16 w-16 text-indigo-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
            <p class="text-lg text-gray-600 mb-2">ファイルをドラッグ＆ドロップ</p>
            <p class="text-sm text-gray-400">または クリックして選択</p>
            <p class="text-xs text-gray-400 mt-2">対応形式: PDF, PNG, JPG, JPEG, TIFF</p>
            <input type="file" name="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg,.tif,.tiff" class="hidden">
        </div>

        <div id="file-info" class="hidden mt-4 p-4 bg-white rounded-lg shadow-sm border border-gray-200">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <svg class="h-8 w-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <div>
                        <p id="file-name" class="font-medium text-gray-700"></p>
                        <p id="file-size" class="text-sm text-gray-400"></p>
                    </div>
                </div>
                <button type="button" id="clear-file" class="text-gray-400 hover:text-red-500">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>

        <button type="submit" id="submit-btn" disabled
                class="mt-6 w-full py-3 px-6 bg-indigo-600 text-white rounded-lg font-medium
                       hover:bg-indigo-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors">
            OCR処理を開始
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/upload.js"></script>
{% endblock %}
