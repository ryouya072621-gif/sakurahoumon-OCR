{% extends "base.html" %}
{% block title %}相談シート結果 - YomiToku Web{% endblock %}
{% block head %}
<style>
    .patient-sidebar { width: 260px; min-width: 260px; border-right: 1px solid #e5e7eb; overflow-y: auto; }
    .patient-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-size: 0.875rem; }
    .patient-item:hover { background-color: #f0fdf4; }
    .patient-item.active { background-color: #dcfce7; border-left: 3px solid #059669; }
    .patient-item .status-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 9999px; }
    .main-content { flex: 1; overflow-y: auto; }
    .field-row { display: flex; padding: 6px 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.875rem; gap: 8px; }
    .field-label { color: #64748b; min-width: 140px; flex-shrink: 0; font-weight: 500; }
    .field-value { color: #1e293b; }
    .field-value.editable { cursor: pointer; border-radius: 4px; padding: 1px 4px; }
    .field-value.editable:hover { background-color: #eef2ff; }
    .field-value.editing { background-color: #fef3c7; }
    .field-value.modified { border-left: 3px solid #f59e0b; padding-left: 4px; }
    .section-card { border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
    .section-header { background: #f8fafc; padding: 8px 12px; font-weight: 600; font-size: 0.875rem; border-bottom: 1px solid #e5e7eb; }
    .condition-tag { display: inline-block; padding: 2px 8px; margin: 2px; border-radius: 4px; font-size: 0.8rem; }
    .condition-checked { background-color: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .schedule-grid { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .schedule-grid th, .schedule-grid td { border: 1px solid #e2e8f0; padding: 4px 10px; text-align: center; }
    .schedule-grid th { background: #f1f5f9; font-weight: 600; }
    .mark-ok { color: #059669; font-weight: bold; font-size: 1rem; }
    .mark-ng { color: #ef4444; }
</style>
{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-4">
    <h1 class="text-xl font-bold text-gray-800">相談シート結果一覧</h1>
    <div class="flex items-center gap-2">
        <button id="analyze-all-btn"
                class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm font-medium">
            全件AI解析
        </button>
        <button id="export-csv-btn"
                class="px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 text-sm font-medium">
            DentNet CSV出力
        </button>
    </div>
</div>

<div class="flex bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden" style="height: calc(100vh - 140px);">
    <div class="patient-sidebar" id="patient-sidebar"></div>
    <div class="main-content p-4" id="main-content">
        <p class="text-gray-400 text-sm">左の患者名を選択して詳細を表示</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const BATCH_ID = "{{ batch_id }}";
    const JOBS_DATA = {{ jobs_data | tojson }};
    // Per-job structured data cache
    const STRUCTURED_CACHE = {};
</script>
<script src="/static/js/consultation.js"></script>
{% endblock %}
