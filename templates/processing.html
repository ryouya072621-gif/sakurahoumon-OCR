{% extends "base.html" %}
{% block title %}処理中 - YomiToku Web{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto mt-20 text-center">
    <div class="mb-8">
        <div id="spinner" class="inline-block w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
    </div>
    <h1 class="text-2xl font-bold text-gray-800 mb-2">OCR処理中...</h1>
    <p class="text-gray-500 mb-6">CPU推論のため、1ページあたり約1〜3分かかります</p>

    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <div class="flex justify-between text-sm text-gray-600 mb-2">
            <span id="status-text">初期化中...</span>
            <span id="progress-text"></span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-3">
            <div id="progress-bar" class="bg-indigo-600 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>
        <p id="page-info" class="text-sm text-gray-400 mt-3"></p>
    </div>

    <div id="error-box" class="hidden mt-6 p-4 bg-red-50 border border-red-200 rounded-lg text-red-700 text-left">
        <p class="font-medium">エラーが発生しました</p>
        <p id="error-msg" class="text-sm mt-1"></p>
        <a href="/" class="inline-block mt-3 text-sm text-indigo-600 hover:underline">トップに戻る</a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const JOB_ID = "{{ job_id }}";
</script>
<script src="/static/js/processing.js"></script>
{% endblock %}
